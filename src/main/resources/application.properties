# =============================================================
# DATABASE CONFIGURATION
# =============================================================
# Railway sets SPRING_DATASOURCE_URL (PostgreSQL). Locally falls back to MySQL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campusconnect?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Nani@2006}
# Driver is auto-detected by DataSourceConfig.java (mysql vs postgresql)

# JPA / Hibernate — dialect auto-detected from the JDBC URL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

