# =============================================================
# DATABASE CONFIGURATION
# =============================================================
# Railway injects SPRING_DATASOURCE_URL, USERNAME, PASSWORD automatically.
# Locally falls back to MySQL defaults.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campusconnect?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Nani@2006}

# =============================================================
# JPA / HIBERNATE
# =============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# =============================================================
# JWT CONFIGURATION
# =============================================================
campusconnect.jwt.secret=${JWT_SECRET:NDQxZGE1YWI1YTdhM2M5MGJhZDA2ZDdlNGNlMzBmMTViOWRiZjBjNzhjYTc2NzllOTI1M2NkYzk4MWIzMzY4Ng==}
