# =============================================================
# DATABASE — handled by DataSourceConfig.java bean
# (Railway sets DATABASE_URL automatically; DataSourceConfig
#  converts postgresql:// → jdbc:postgresql:// for HikariCP)
# For LOCAL dev only — override these in application-local.properties
# =============================================================
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

