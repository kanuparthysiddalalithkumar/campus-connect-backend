# =============================================================
# DATABASE
# Local dev  → MySQL Workbench (defaults below, no profile needed)
# Railway    → set SPRING_DATASOURCE_URL / USERNAME / PASSWORD +
#              SPRING_JPA_DATABASE_PLATFORM as env vars
# =============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campusconnect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
# Driver is auto-detected from the JDBC URL — no need to hard-code it

# JPA / Hibernate
# Local default = MySQL dialect; Railway overrides with PostgreSQL via env var
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

